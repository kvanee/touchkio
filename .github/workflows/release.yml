name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install yarn
        run: npm install --global yarn

      - name: Install dependencies
        run: yarn install

      # Pure-JS deps (axios, electron-log, mqtt) -> arm64 cross-builds fine on
      # the x64 runner; no QEMU needed. Publishes a release with the .deb assets
      # to the repo in forge.config.js (kvanee/touchkio) using the built-in token.
      - name: Build + publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn electron-forge publish --arch arm64,x64
